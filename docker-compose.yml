services:
  postgres:
    image: postgres:16-alpine
    container_name: nextdream-postgres
    environment:
      POSTGRES_DB: nextdream
      POSTGRES_USER: nextdream
      POSTGRES_PASSWORD: nextdream
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextdream -d nextdream"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: nextdream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: nextdream-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nextdream
      MINIO_ROOT_PASSWORD: nextdream123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: nextdream-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8025"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  minio-data:
