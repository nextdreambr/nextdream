name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: ["completed"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, oci-prod]
    environment: production
    timeout-minutes: 45
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on OCI self-hosted runner
        shell: bash
        env:
          APP_DIR: ${{ vars.APP_DIR || '/opt/nextdream' }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          API_PORT: ${{ vars.API_PORT }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.PROD_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail

          mkdir -p "$APP_DIR"
          rsync -a --delete --exclude '.git' ./ "$APP_DIR"/

          cat > "$APP_DIR/.env.production" <<EOV
          NODE_ENV=${NODE_ENV}
          API_PORT=${API_PORT}
          APP_URL=${APP_URL}
          CORS_ORIGIN=${CORS_ORIGIN}
          VITE_API_URL=${VITE_API_URL}
          DATABASE_URL=${DATABASE_URL}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          EOV

          cd "$APP_DIR"
          docker compose -f docker-compose.prod.yml up -d --build
          docker compose -f docker-compose.prod.yml ps
          sleep 5
          curl -fsS http://127.0.0.1/api/health >/dev/null
