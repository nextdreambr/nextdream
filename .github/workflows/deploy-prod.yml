name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "deploy builds and deploys a tag; rollback redeploys an existing tag"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      image_tag:
        description: "Optional for deploy (override tag), required for rollback"
        required: false
        type: string
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: ["completed"]

permissions:
  contents: read
  packages: read

jobs:
  resolve-release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_mode: ${{ steps.resolve.outputs.release_mode }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      repo_lc: ${{ steps.resolve.outputs.repo_lc }}
    steps:
      - name: Resolve release metadata
        id: resolve
        env:
          WORKFLOW_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          WORKFLOW_RELEASE_MODE: ${{ github.event.inputs.release_mode }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          release_mode="deploy"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_mode="${WORKFLOW_RELEASE_MODE:-deploy}"
          fi

          if [[ "$release_mode" == "rollback" ]]; then
            image_tag="${WORKFLOW_IMAGE_TAG:-}"
            if [[ -z "$image_tag" ]]; then
              echo "workflow_dispatch rollback requires image_tag"
              exit 1
            fi
          else
            image_tag="${WORKFLOW_IMAGE_TAG:-}"
            if [[ -z "$image_tag" ]]; then
              if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
                image_tag="${WORKFLOW_SHA}"
              else
                image_tag="${CURRENT_SHA}"
              fi
            fi
          fi

          repo_lc="${REPO,,}"

          echo "release_mode=$release_mode" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

  build-images:
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.release_mode == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate web observability build vars
        if: ${{ matrix.name == 'web' }}
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SANDBOX_HOSTNAME: ${{ vars.VITE_SANDBOX_HOSTNAME }}
          SENTRY_DSN_WEB: ${{ vars.SENTRY_DSN_WEB }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.15' }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: |
          set -euo pipefail
          required=(
            VITE_API_URL
            VITE_SANDBOX_HOSTNAME
            SENTRY_DSN_WEB
            SENTRY_TRACES_SAMPLE_RATE
            VITE_GA_MEASUREMENT_ID
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required value for web build: $key"
              exit 1
            fi
          done

      - name: Build and push ${{ matrix.name }} image
        if: ${{ matrix.name == 'api' }}
        id: build_push_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ needs.resolve-release.outputs.repo_lc }}-${{ matrix.name }}:${{ needs.resolve-release.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and push ${{ matrix.name }} image with Sentry web env
        if: ${{ matrix.name == 'web' }}
        id: build_push_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ needs.resolve-release.outputs.repo_lc }}-${{ matrix.name }}:${{ needs.resolve-release.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_SANDBOX_HOSTNAME=${{ vars.VITE_SANDBOX_HOSTNAME }}
            VITE_SENTRY_DSN=${{ vars.SENTRY_DSN_WEB }}
            VITE_SENTRY_TRACES_SAMPLE_RATE=${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.15' }}
            VITE_SENTRY_RELEASE=${{ needs.resolve-release.outputs.image_tag }}
            VITE_GA_MEASUREMENT_ID=${{ vars.VITE_GA_MEASUREMENT_ID }}

      - name: Resolve published image digest
        id: pushed_image
        env:
          IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
          REPO_LC: ${{ needs.resolve-release.outputs.repo_lc }}
        run: |
          set -euo pipefail

          tag_ref="ghcr.io/${REPO_LC}-${{ matrix.name }}:${IMAGE_TAG}"
          digest=""

          for attempt in $(seq 1 5); do
            digest="$(docker buildx imagetools inspect "$tag_ref" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"')"
            if [[ -n "$digest" && "$digest" != "null" ]]; then
              echo "image_ref=${tag_ref%%:*}@${digest}" >> "$GITHUB_OUTPUT"
              echo "tag_ref=${tag_ref}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done

          echo "Unable to resolve digest for ${tag_ref}"
          exit 1

      - name: Scan published ${{ matrix.name }} image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.pushed_image.outputs.image_ref }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Generate SBOM for ${{ matrix.name }} image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.pushed_image.outputs.image_ref }}
          artifact-name: sbom-${{ matrix.name }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign published ${{ matrix.name }} image
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.pushed_image.outputs.image_ref }}"

  deploy:
    needs:
      - resolve-release
      - build-images
    if: ${{ always() && needs.resolve-release.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    timeout-minutes: 30
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    env:
      RELEASE_MODE: ${{ needs.resolve-release.outputs.release_mode }}
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      IMAGE_REPO_BASE: ghcr.io/${{ needs.resolve-release.outputs.repo_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR for deploy image resolution
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Validate required deployment variables
        id: validate_deploy
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '1025' }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          TRUST_PROXY: ${{ vars.TRUST_PROXY }}
          PROXY_TRUSTED_IPS: ${{ vars.PROXY_TRUSTED_IPS }}
          DOCKER_SUBNET: ${{ vars.DOCKER_SUBNET || '172.30.0.0/24' }}
          API_CONTAINER_IP: ${{ vars.API_CONTAINER_IP || '172.30.0.3' }}
          WEB_PROXY_IP: ${{ vars.WEB_PROXY_IP || '172.30.0.2' }}
          AUTH_COOKIE_DOMAIN: ${{ vars.AUTH_COOKIE_DOMAIN }}
          AUTH_COOKIE_SECURE: ${{ vars.AUTH_COOKIE_SECURE }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.PROD_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENTRY_DSN_WEB: ${{ vars.SENTRY_DSN_WEB }}
          SENTRY_DSN_API: ${{ vars.SENTRY_DSN_API }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          MIN_FREE_DISK_MB: ${{ vars.MIN_FREE_DISK_MB || '2048' }}
        run: |
          set -euo pipefail

          normalize_boolean_env() {
            local key="$1"
            local value="$2"
            local normalized
            normalized="$(echo "$value" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

            case "$normalized" in
              true|1|yes)
                printf 'true'
                ;;
              false|0|no)
                printf 'false'
                ;;
              *)
                echo "Invalid $key value: expected one of [true, 1, yes, false, 0, no]"
                exit 1
                ;;
            esac
          }

          required=(
            SMTP_HOST
            SMTP_FROM
            OCI_HOST
            OCI_USER
            OCI_PORT
            OCI_SSH_KEY
            OCI_KNOWN_HOSTS
            APP_DIR
            NODE_ENV
            APP_URL
            CORS_ORIGIN
            VITE_API_URL
            TRUST_PROXY
            AUTH_COOKIE_SECURE
            DATABASE_URL
            JWT_ACCESS_SECRET
            JWT_REFRESH_SECRET
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            OPENAI_API_KEY
            SENTRY_DSN_WEB
            SENTRY_DSN_API
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

          normalized_trust_proxy="$(normalize_boolean_env "TRUST_PROXY" "$TRUST_PROXY")"
          normalized_auth_cookie_secure="$(normalize_boolean_env "AUTH_COOKIE_SECURE" "$AUTH_COOKIE_SECURE")"

          normalized_proxy_trusted_ips="$(echo "${PROXY_TRUSTED_IPS:-}" | tr -d '[:space:]')"
          if [[ "$normalized_trust_proxy" == "true" && -z "$normalized_proxy_trusted_ips" ]]; then
            echo "Missing required value: PROXY_TRUSTED_IPS (required when TRUST_PROXY=true)"
            exit 1
          fi

          echo "normalized_trust_proxy=${normalized_trust_proxy}" >> "$GITHUB_OUTPUT"
          echo "normalized_auth_cookie_secure=${normalized_auth_cookie_secure}" >> "$GITHUB_OUTPUT"
          echo "normalized_proxy_trusted_ips=${normalized_proxy_trusted_ips}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH configuration
        env:
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_SSH_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          printf '%s\n' "$OCI_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Resolve immutable image references
        id: image_refs
        run: |
          set -euo pipefail

          resolve_image() {
            local tag_ref="$1"
            local digest=""

            for attempt in $(seq 1 5); do
              digest="$(docker buildx imagetools inspect "$tag_ref" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"')"
              if [[ -n "$digest" && "$digest" != "null" ]]; then
                printf '%s@%s' "${tag_ref%%:*}" "$digest"
                return 0
              fi
              sleep 5
            done

            echo "Unable to resolve digest for $tag_ref"
            exit 1
          }

          api_tag_ref="${IMAGE_REPO_BASE}-api:${IMAGE_TAG}"
          web_tag_ref="${IMAGE_REPO_BASE}-web:${IMAGE_TAG}"

          echo "api_image=$(resolve_image "$api_tag_ref")" >> "$GITHUB_OUTPUT"
          echo "web_image=$(resolve_image "$web_tag_ref")" >> "$GITHUB_OUTPUT"

      - name: Install Cosign for deploy verification
        uses: sigstore/cosign-installer@v3.8.1

      - name: Verify signed image references
        run: |
          set -euo pipefail

          verify_image() {
            local image_ref="$1"
            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp '^https://github\.com/nextdreambr/nextdream/\.github/workflows/deploy-prod\.yml@.*$' \
              "$image_ref" >/dev/null
          }

          verify_image "${{ steps.image_refs.outputs.api_image }}"
          verify_image "${{ steps.image_refs.outputs.web_image }}"

      - name: Read previous deployed tag
        id: previous
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
        run: |
          set -euo pipefail
          previous_tag="$(ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" "cat '$APP_DIR/.release-tag' 2>/dev/null || true")"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Read previous deployed state
        id: previous_state
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
        run: |
          set -euo pipefail

          previous_state="$(ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" "cat '$APP_DIR/.release-state.json' 2>/dev/null || true")"
          if [[ -n "$previous_state" ]] && jq -e . >/dev/null 2>&1 <<<"$previous_state"; then
            echo "previous_tag=$(jq -r '.imageTag // empty' <<<"$previous_state")" >> "$GITHUB_OUTPUT"
            echo "previous_api_image=$(jq -r '.apiImage // empty' <<<"$previous_state")" >> "$GITHUB_OUTPUT"
            echo "previous_web_image=$(jq -r '.webImage // empty' <<<"$previous_state")" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "previous_api_image=" >> "$GITHUB_OUTPUT"
            echo "previous_web_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare deployment bundle
        id: deploy_bundle
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '1025' }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          API_BIND_ADDRESS: ${{ vars.API_BIND_ADDRESS || '127.0.0.1' }}
          WEB_BIND_ADDRESS: ${{ vars.WEB_BIND_ADDRESS || '127.0.0.1' }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          TRUST_PROXY: ${{ steps.validate_deploy.outputs.normalized_trust_proxy }}
          PROXY_TRUSTED_IPS: ${{ steps.validate_deploy.outputs.normalized_proxy_trusted_ips }}
          DOCKER_SUBNET: ${{ vars.DOCKER_SUBNET || '172.30.0.0/24' }}
          API_CONTAINER_IP: ${{ vars.API_CONTAINER_IP || '172.30.0.3' }}
          WEB_PROXY_IP: ${{ vars.WEB_PROXY_IP || '172.30.0.2' }}
          AUTH_COOKIE_DOMAIN: ${{ vars.AUTH_COOKIE_DOMAIN }}
          AUTH_COOKIE_SECURE: ${{ steps.validate_deploy.outputs.normalized_auth_cookie_secure }}
          LOGIN_THROTTLE_TTL_MS: ${{ vars.LOGIN_THROTTLE_TTL_MS || '60000' }}
          LOGIN_THROTTLE_LIMIT: ${{ vars.LOGIN_THROTTLE_LIMIT || '5' }}
          THROTTLE_TTL_MS: ${{ vars.THROTTLE_TTL_MS || '60000' }}
          THROTTLE_LIMIT: ${{ vars.THROTTLE_LIMIT || '120' }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.PROD_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENTRY_DSN_API: ${{ vars.SENTRY_DSN_API }}
          SENTRY_DSN_WEB: ${{ vars.SENTRY_DSN_WEB }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.15' }}
          MIN_FREE_DISK_MB: ${{ vars.MIN_FREE_DISK_MB || '2048' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          API_IMAGE: ${{ steps.image_refs.outputs.api_image }}
          WEB_IMAGE: ${{ steps.image_refs.outputs.web_image }}
        run: |
          set -euo pipefail

          database_url_runtime="$DATABASE_URL"
          if [[ "$database_url_runtime" == *"sslmode=require"* && "$database_url_runtime" != *"uselibpqcompat="* ]]; then
            separator='&'
            if [[ "$database_url_runtime" != *'?'* ]]; then
              separator='?'
            fi
            database_url_runtime="${database_url_runtime}${separator}uselibpqcompat=true"
          fi

          bundle_dir="$(mktemp -d)"
          chmod 700 "$bundle_dir"

          cat > "$bundle_dir/.env.production" <<EOF
          APP_ENV=production
          NODE_ENV=${NODE_ENV}
          API_BIND_ADDRESS=${API_BIND_ADDRESS}
          WEB_BIND_ADDRESS=${WEB_BIND_ADDRESS}
          APP_URL=${APP_URL}
          CORS_ORIGIN=${CORS_ORIGIN}
          VITE_API_URL=${VITE_API_URL}
          TRUST_PROXY=${TRUST_PROXY}
          PROXY_TRUSTED_IPS=${PROXY_TRUSTED_IPS}
          DOCKER_SUBNET=${DOCKER_SUBNET}
          API_CONTAINER_IP=${API_CONTAINER_IP}
          WEB_PROXY_IP=${WEB_PROXY_IP}
          AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE}
          THROTTLE_TTL_MS=${THROTTLE_TTL_MS}
          THROTTLE_LIMIT=${THROTTLE_LIMIT}
          LOGIN_THROTTLE_TTL_MS=${LOGIN_THROTTLE_TTL_MS}
          LOGIN_THROTTLE_LIMIT=${LOGIN_THROTTLE_LIMIT}
          DATABASE_URL=${database_url_runtime}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          RESEND_API_KEY=${RESEND_API_KEY}
          RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
          CHAT_MODERATION_ENABLED=true
          CHAT_MODERATION_PROVIDER=openai
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODERATION_MODEL=omni-moderation-latest
          OPENAI_TIMEOUT_MS=3000
          SENTRY_DSN=${SENTRY_DSN_API}
          SENTRY_DSN_WEB=${SENTRY_DSN_WEB}
          SENTRY_ENVIRONMENT=production
          SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE}
          SENTRY_RELEASE=${IMAGE_TAG}
          EOF

          if [[ -n "${AUTH_COOKIE_DOMAIN:-}" ]]; then
            printf '\nAUTH_COOKIE_DOMAIN=%s\n' "$AUTH_COOKIE_DOMAIN" >> "$bundle_dir/.env.production"
          fi

          cat > "$bundle_dir/.deploy-runtime.env" <<EOF
          DEPLOY_ACTION=deploy
          API_IMAGE=${API_IMAGE}
          WEB_IMAGE=${WEB_IMAGE}
          IMAGE_TAG=${IMAGE_TAG}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          MIN_FREE_DISK_MB=${MIN_FREE_DISK_MB}
          EOF

          chmod 600 "$bundle_dir/.env.production" "$bundle_dir/.deploy-runtime.env"
          cp docker-compose.prod.yml scripts/deploy-prod-remote.sh "$bundle_dir/"
          echo "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Deploy selected tag
        id: deploy_selected_tag
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
          BUNDLE_DIR: ${{ steps.deploy_bundle.outputs.bundle_dir }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "sudo mkdir -p '$APP_DIR' && sudo chown -R '$OCI_USER:$OCI_USER' '$APP_DIR'"

          scp -i ~/.ssh/oci_key -P "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$BUNDLE_DIR/docker-compose.prod.yml" \
            "$BUNDLE_DIR/.env.production" \
            "$BUNDLE_DIR/.deploy-runtime.env" \
            "$BUNDLE_DIR/deploy-prod-remote.sh" \
            "$OCI_USER@$OCI_HOST:$APP_DIR/"

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "chmod 700 '$APP_DIR/deploy-prod-remote.sh' && APP_DIR='$APP_DIR' '$APP_DIR/deploy-prod-remote.sh'"

      - name: Verify public API endpoints
        id: verify_public_endpoints
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail

          base_url="${APP_URL%/}"

          if ! curl -fsS --max-time 10 "$base_url/" >/dev/null 2>&1; then
            echo "Public web check failed at $base_url/"
            exit 1
          fi

          health_ready=0
          for attempt in $(seq 1 10); do
            if curl -fsS --max-time 10 "$base_url/api/health" >/dev/null 2>&1; then
              health_ready=1
              break
            fi
            sleep 2
          done

          if [[ "$health_ready" -ne 1 ]]; then
            echo "Public API health check failed at $base_url/api/health"
            exit 1
          fi

          status_code="$(curl -sS --max-time 10 -o /tmp/login-smoke.json -w '%{http_code}' \
            -X POST "$base_url/api/auth/login" \
            -H 'Content-Type: application/json' \
            --data '{"email":"invalid@example.com","password":"invalid-password"}')"

          if [[ "$status_code" == "000" || "$status_code" -ge 500 ]]; then
            echo "Public login smoke failed with status: $status_code"
            cat /tmp/login-smoke.json || true
            exit 1
          fi

      - name: Verify web bundle contains Sentry DSN marker
        id: verify_web_bundle
        env:
          APP_URL: ${{ vars.APP_URL }}
          SENTRY_DSN_WEB: ${{ vars.SENTRY_DSN_WEB }}
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          dsn_no_proto="${SENTRY_DSN_WEB#*://}"
          host_and_project="${dsn_no_proto#*@}"
          dsn_host="${host_and_project%%/*}"
          dsn_project="${host_and_project##*/}"
          marker="${dsn_host}/${dsn_project}"
          base_url="${APP_URL%/}"

          curl -fsSL "$base_url" -o "$tmp_dir/index.html"
          script_path="$(grep -oE 'assets/[^" ]+\.js' "$tmp_dir/index.html" | head -n1)"

          if [[ -z "$script_path" ]]; then
            echo "Could not locate compiled web bundle in $APP_URL"
            exit 1
          fi

          curl -fsSL "$base_url/$script_path" -o "$tmp_dir/app.js"

          if ! grep -qF "$marker" "$tmp_dir/app.js"; then
            echo "Sentry DSN marker not found in published web bundle (expected marker: $marker)"
            exit 1
          fi

      - name: Auto rollback to previous release on deploy verification failure
        if: ${{ failure() && steps.previous_state.outputs.previous_api_image != '' && steps.previous_state.outputs.previous_web_image != '' && (steps.deploy_selected_tag.outcome == 'failure' || steps.verify_public_endpoints.outcome == 'failure' || steps.verify_web_bundle.outcome == 'failure') }}
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
          PREVIOUS_API_IMAGE: ${{ steps.previous_state.outputs.previous_api_image }}
          PREVIOUS_WEB_IMAGE: ${{ steps.previous_state.outputs.previous_web_image }}
          PREVIOUS_TAG: ${{ steps.previous_state.outputs.previous_tag || steps.previous.outputs.previous_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          MIN_FREE_DISK_MB: ${{ vars.MIN_FREE_DISK_MB || '2048' }}
        run: |
          set -euo pipefail

          rollback_dir="$(mktemp -d)"
          chmod 700 "$rollback_dir"
          cat > "$rollback_dir/.deploy-runtime.env" <<EOF
          DEPLOY_ACTION=rollback
          API_IMAGE=${PREVIOUS_API_IMAGE}
          WEB_IMAGE=${PREVIOUS_WEB_IMAGE}
          IMAGE_TAG=${PREVIOUS_TAG}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          MIN_FREE_DISK_MB=${MIN_FREE_DISK_MB}
          EOF
          chmod 600 "$rollback_dir/.deploy-runtime.env"
          cp docker-compose.prod.yml scripts/deploy-prod-remote.sh "$rollback_dir/"

          scp -i ~/.ssh/oci_key -P "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$rollback_dir/docker-compose.prod.yml" \
            "$rollback_dir/.deploy-runtime.env" \
            "$rollback_dir/deploy-prod-remote.sh" \
            "$OCI_USER@$OCI_HOST:$APP_DIR/"

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "chmod 700 '$APP_DIR/deploy-prod-remote.sh' && APP_DIR='$APP_DIR' '$APP_DIR/deploy-prod-remote.sh'"

      - name: Emit API Sentry warning log smoke event
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          SMOKE_ID: deploy-smoke-${{ github.run_id }}-${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "SMOKE_ID='$SMOKE_ID' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'EOS'
          set -euo pipefail

          docker exec \
            -e DEPLOY_SMOKE_ID="$SMOKE_ID" \
            -e DEPLOY_RELEASE="$IMAGE_TAG" \
            -i nextdream-api node - <<'NODE'
          const Sentry = require('@sentry/node');

          const dsn = process.env.SENTRY_DSN;
          if (!dsn) {
            console.error('SENTRY_DSN is not set inside nextdream-api container');
            process.exit(1);
          }

          Sentry.init({
            dsn,
            environment: process.env.SENTRY_ENVIRONMENT || 'production',
            release: process.env.DEPLOY_RELEASE,
            tracesSampleRate: 0,
            sendDefaultPii: false,
          });

          const smokeId = process.env.DEPLOY_SMOKE_ID || 'deploy-smoke-missing-id';

          Sentry.captureMessage(`deploy smoke warning ${smokeId}`, {
            level: 'warning',
            tags: {
              deploy_smoke: 'true',
              deploy_smoke_id: smokeId,
            },
          });

          Sentry.flush(10000)
            .then(() => Sentry.close(2000))
            .then(() => process.exit(0))
            .catch((error) => {
              console.error('Failed to flush smoke event to Sentry', error);
              process.exit(1);
            });
          NODE
          EOS

      - name: Wait for API smoke event in Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT_API: ${{ vars.SENTRY_PROJECT_API }}
          SMOKE_ID: deploy-smoke-${{ github.run_id }}-${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          required=(
            SENTRY_AUTH_TOKEN
            SENTRY_ORG
            SENTRY_PROJECT_API
            SMOKE_ID
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

          found=0
          permission_denied=0
          for attempt in $(seq 1 12); do
            response="$(curl -sS --get \
              -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
              --data-urlencode "query=message:\"$SMOKE_ID\"" \
              --data-urlencode "statsPeriod=5m" \
              --data-urlencode "per_page=5" \
              -w "\n%{http_code}" \
              "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT_API/events/")"

            http_code="$(printf '%s\n' "$response" | tail -n1)"
            body="$(printf '%s\n' "$response" | sed '$d')"

            if [[ "$http_code" == "403" ]]; then
              echo "::warning::Sentry API token has no permission to read project events. Skipping smoke query validation."
              permission_denied=1
              break
            fi

            if [[ "$http_code" != "200" ]]; then
              echo "Sentry API returned HTTP $http_code"
              printf '%s\n' "$body"
              exit 1
            fi

            count="$(printf '%s\n' "$body" | jq 'if type == "array" then length else 0 end')"
            if [[ "$count" -gt 0 ]]; then
              found=1
              break
            fi

            sleep 10
          done

          if [[ "$permission_denied" -eq 1 ]]; then
            echo "Sentry event query skipped due to token scope. Deploy kept healthy and smoke event was emitted."
            exit 0
          fi

          if [[ "$found" -ne 1 ]]; then
            echo "Timed out waiting for Sentry API smoke event: $SMOKE_ID"
            exit 1
          fi
      - name: Deploy summary
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "- Mode: ${RELEASE_MODE}"
            echo "- Deployed tag: ${IMAGE_TAG}"
            echo "- API image: ${{ steps.image_refs.outputs.api_image }}"
            echo "- Web image: ${{ steps.image_refs.outputs.web_image }}"
            echo "- Previous tag: ${{ steps.previous_state.outputs.previous_tag || steps.previous.outputs.previous_tag || 'none' }}"
            echo "- Observability smoke: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump remote diagnostics on failure
        if: failure()
        continue-on-error: true
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/home/actions/nextdream' }}
          API_IMAGE: ${{ env.IMAGE_REPO_BASE }}-api:${{ env.IMAGE_TAG }}
          WEB_IMAGE: ${{ env.IMAGE_REPO_BASE }}-web:${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "APP_DIR='$APP_DIR' API_IMAGE='$API_IMAGE' WEB_IMAGE='$WEB_IMAGE' bash -s" <<'EOS'
          set -euo pipefail
          cd "$APP_DIR" || exit 0
          docker compose --env-file .env.production -f docker-compose.prod.yml ps || true
          docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail 200 api || true
          docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail 200 web || true
          docker inspect nextdream-api --format '{{json .Config.Image}} {{json .NetworkSettings.Networks}}' || true
          docker inspect nextdream-web --format '{{json .Config.Image}} {{json .NetworkSettings.Networks}}' || true
          cat "$APP_DIR/.release-state.json" 2>/dev/null || true
          cat "$APP_DIR/.release-tag" 2>/dev/null || true
          EOS
