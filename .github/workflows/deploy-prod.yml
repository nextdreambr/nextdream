name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "deploy builds and deploys a tag; rollback redeploys an existing tag"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      image_tag:
        description: "Optional for deploy (override tag), required for rollback"
        required: false
        type: string
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: ["completed"]

permissions:
  contents: read
  packages: write

jobs:
  resolve-release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_mode: ${{ steps.resolve.outputs.release_mode }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      repo_lc: ${{ steps.resolve.outputs.repo_lc }}
    steps:
      - name: Resolve release metadata
        id: resolve
        env:
          WORKFLOW_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          WORKFLOW_RELEASE_MODE: ${{ github.event.inputs.release_mode }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          release_mode="deploy"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_mode="${WORKFLOW_RELEASE_MODE:-deploy}"
          fi

          if [[ "$release_mode" == "rollback" ]]; then
            image_tag="${WORKFLOW_IMAGE_TAG:-}"
            if [[ -z "$image_tag" ]]; then
              echo "workflow_dispatch rollback requires image_tag"
              exit 1
            fi
          else
            image_tag="${WORKFLOW_IMAGE_TAG:-}"
            if [[ -z "$image_tag" ]]; then
              if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
                image_tag="${WORKFLOW_SHA}"
              else
                image_tag="${CURRENT_SHA}"
              fi
            fi
          fi

          repo_lc="${REPO,,}"

          echo "release_mode=$release_mode" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$repo_lc" >> "$GITHUB_OUTPUT"

  build-images:
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.release_mode == 'deploy' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile.api
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ needs.resolve-release.outputs.repo_lc }}-${{ matrix.name }}:${{ needs.resolve-release.outputs.image_tag }}

  deploy:
    needs:
      - resolve-release
      - build-images
    if: ${{ always() && needs.resolve-release.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    env:
      RELEASE_MODE: ${{ needs.resolve-release.outputs.release_mode }}
      IMAGE_TAG: ${{ needs.resolve-release.outputs.image_tag }}
      IMAGE_REPO_BASE: ghcr.io/${{ needs.resolve-release.outputs.repo_lc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deployment variables
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/nextdream' }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          API_PORT: ${{ vars.API_PORT }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.PROD_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          required=(
            OCI_HOST
            OCI_USER
            OCI_PORT
            OCI_SSH_KEY
            OCI_KNOWN_HOSTS
            APP_DIR
            NODE_ENV
            API_PORT
            APP_URL
            CORS_ORIGIN
            VITE_API_URL
            DATABASE_URL
            JWT_ACCESS_SECRET
            JWT_REFRESH_SECRET
            GHCR_USERNAME
            GHCR_TOKEN
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

      - name: Prepare SSH configuration
        env:
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          OCI_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_SSH_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          printf '%s\n' "$OCI_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Read previous deployed tag
        id: previous
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/nextdream' }}
        run: |
          set -euo pipefail
          previous_tag="$(ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" "cat '$APP_DIR/.release-tag' 2>/dev/null || true")"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Deploy selected tag
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/nextdream' }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          API_PORT: ${{ vars.API_PORT }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.PROD_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          API_IMAGE: ${{ env.IMAGE_REPO_BASE }}-api:${{ env.IMAGE_TAG }}
          WEB_IMAGE: ${{ env.IMAGE_REPO_BASE }}-web:${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "sudo mkdir -p '$APP_DIR' && sudo chown -R '$OCI_USER:$OCI_USER' '$APP_DIR'"

          scp -i ~/.ssh/oci_key -P "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            docker-compose.prod.yml "$OCI_USER@$OCI_HOST:$APP_DIR/docker-compose.prod.yml"

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "cat > '$APP_DIR/.env.production'" <<EOV
          NODE_ENV=${NODE_ENV}
          API_PORT=${API_PORT}
          APP_URL=${APP_URL}
          CORS_ORIGIN=${CORS_ORIGIN}
          VITE_API_URL=${VITE_API_URL}
          DATABASE_URL=${DATABASE_URL}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          EOV

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "chmod 600 '$APP_DIR/.env.production'"

          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "APP_DIR='$APP_DIR' API_IMAGE='$API_IMAGE' WEB_IMAGE='$WEB_IMAGE' IMAGE_TAG='$IMAGE_TAG' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'EOS'
          set -euo pipefail
          cd "$APP_DIR"

          if [[ ! -f docker-compose.prod.yml ]]; then
            echo "docker-compose.prod.yml not found in $APP_DIR"
            exit 1
          fi

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml ps

          curl -fsS --max-time 20 --retry 8 --retry-delay 3 http://127.0.0.1/api/health >/dev/null
          printf '%s' "$IMAGE_TAG" > "$APP_DIR/.release-tag"
          EOS

      - name: Deploy summary
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "- Mode: ${RELEASE_MODE}"
            echo "- Deployed tag: ${IMAGE_TAG}"
            echo "- Previous tag: ${{ steps.previous.outputs.previous_tag || 'none' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump remote diagnostics on failure
        if: failure()
        continue-on-error: true
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_PORT: ${{ vars.OCI_PORT || '22' }}
          APP_DIR: ${{ vars.APP_DIR || '/opt/nextdream' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/oci_key -p "$OCI_PORT" -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "$OCI_USER@$OCI_HOST" \
            "APP_DIR='$APP_DIR' bash -s" <<'EOS'
          set -euo pipefail
          cd "$APP_DIR" || exit 0
          docker compose -f docker-compose.prod.yml ps || true
          docker compose -f docker-compose.prod.yml logs --tail 200 api || true
          docker compose -f docker-compose.prod.yml logs --tail 200 web || true
          cat "$APP_DIR/.release-tag" 2>/dev/null || true
          EOS
