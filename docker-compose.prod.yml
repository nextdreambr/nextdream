services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nextdream-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: nextdream-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

networks:
  default:
    name: nextdream-prod
