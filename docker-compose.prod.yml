services:
  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: nextdream-api
    restart: unless-stopped
    user: node
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_PORT: 4000
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:4000:4000"
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      default:
        ipv4_address: ${API_CONTAINER_IP:-172.30.0.3}

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    container_name: nextdream-web
    restart: unless-stopped
    read_only: true
    depends_on:
      api:
        condition: service_healthy
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      default:
        ipv4_address: ${WEB_PROXY_IP:-172.30.0.2}

networks:
  default:
    name: nextdream-prod
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.30.0.0/24}
