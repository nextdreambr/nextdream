services:
  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: nextdream-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:4000:4000"
    expose:
      - "4000"

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    container_name: nextdream-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:8080:80"

networks:
  default:
    name: nextdream-prod
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.30.0.0/24}
